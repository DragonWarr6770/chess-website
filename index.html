<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Chess Website ♟️</title>
    
    <!-- Chessboard.js CSS from CDN -->
    <link rel="stylesheet" href="https://unpkg.com/@chrisoakman/chessboardjs@1.0.0/dist/chessboard-1.0.0.min.css">
    
            <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #1e1e2e, #2a2a40);
            color: #eee;
            margin: 0;
            padding: 20px;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        h1 {
            margin: 10px 0 5px;
            font-size: 2.8rem;
            text-shadow: 0 4px 10px rgba(0,0,0,0.5);
        }
        .subtitle {
            margin-bottom: 30px;
            color: #aaa;
        }
        .main-container {
            display: flex;
            gap: 50px;
            flex-wrap: wrap;
            justify-content: center;
            align-items: flex-start;
        }
        #myBoard {
            width: 520px;
            height: 520px;
            box-shadow: 0 15px 40px rgba(0,0,0,0.7);
            border: 15px solid #3c2f1e;
            border-radius: 8px;
            background: #3c2f1e;
        }
        .sidebar {
            width: 320px;
            background: #25253a;
            padding: 25px;
            border-radius: 16px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }
        button {
            background: #4a9eff;
            color: white;
            border: none;
            padding: 14px 20px;
            margin: 8px 0;
            border-radius: 8px;
            cursor: pointer;
            font-size: 16px;
            width: 100%;
            transition: all 0.2s;
        }
        button:hover {
            background: #3a8be6;
            transform: translateY(-2px);
        }
        #status {
            font-size: 22px;
            font-weight: bold;
            margin: 20px 0;
            text-align: center;
            min-height: 32px;
            color: #ffd700;
        }
        .captured {
            display: flex;
            flex-wrap: wrap;
            gap: 6px;
            margin: 15px 0;
            min-height: 40px;
        }
        .captured span {
            font-size: 28px;
            line-height: 1;
        }
        .move-history {
            max-height: 260px;
            overflow-y: auto;
            background: #1a1a2e;
            padding: 15px;
            border-radius: 8px;
            font-family: monospace;
            line-height: 1.6;
            margin-bottom: 20px;
        }
        .highlight-square {
            box-shadow: inset 0 0 0 5px #4ade80 !important;
        }
        .modal {
            display: none;
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0,0,0,0.85);
            align-items: center;
            justify-content: center;
            z-index: 1000;
        }
        .modal-content {
            background: #25253a;
            padding: 30px;
            border-radius: 16px;
            text-align: center;
            max-width: 380px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.6);
        }
        .modal-content h2 {
            margin-top: 0;
            color: #ffd700;
        }
        @media (max-width: 900px) {
            #myBoard { width: 420px; height: 420px; }
            .sidebar { width: 280px; }
        }
    </style>
</head>
<body>
            <h1>♟️ Chess Arena</h1>
    <p class="subtitle">Play vs Friend or AI • Free & Open Source</p>

    <div class="main-container">
        <div id="myBoard"></div>

        <div class="sidebar">
            <h2>Game Controls</h2>
            <button onclick="newGame()">New Game</button>
            <button onclick="undoMove()">Undo Last Move</button>
            <button onclick="flipBoard()">Flip Board</button>
            <button onclick="toggleTheme()" class="theme-toggle">Toggle Dark/Light Theme</button>
            <button onclick="exportPGN()">Export Game (PGN)</button>
            
            <div id="status">White to move</div>
            
            <h3>Captured by White</h3>
            <div id="captured-white" class="captured"></div>
            
            <h3>Captured by Black</h3>
            <div id="captured-black" class="captured"></div>
            
            <h3>Move History</h3>
            <div id="move-history" class="move-history"></div>
            
            <h3>Mode</h3>
            <button id="modeBtn" onclick="toggleMode()">Play vs AI (Minimax)</button>
        </div>
    </div>

    <!-- Game Over Modal -->
    <div id="gameModal" class="modal">
        <div class="modal-content">
            <h2 id="modalTitle">Game Over</h2>
            <p id="modalMessage"></p>
            <button onclick="closeModal(); newGame();" style="width:auto; padding:12px 30px; margin-top:15px;">Play Again</button>
        </div>
    </div>
        <!-- Libraries via CDN -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jquery/3.6.0/jquery.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/chess.js/0.10.3/chess.min.js"></script>
    <script src="https://unpkg.com/@chrisoakman/chessboardjs@1.0.0/dist/chessboard-1.0.0.min.js"></script>

    <script>
        let game = new Chess();
        let board = null;
        let isAIEnabled = true;
        let playerColor = 'w';
        let isDarkTheme = true;
        let squareGrey = '#a9a9a9';

        function playMoveSound(isCapture) {
            try {
                const audioContext = new (window.AudioContext || window.webkitAudioContext)();
                const oscillator = audioContext.createOscillator();
                const gain = audioContext.createGain();
                oscillator.type = isCapture ? 'sawtooth' : 'sine';
                oscillator.frequency.setValueAtTime(isCapture ? 800 : 600, audioContext.currentTime);
                gain.gain.value = 0.3;
                oscillator.connect(gain);
                gain.connect(audioContext.destination);
                oscillator.start();
                setTimeout(() => oscillator.stop(), isCapture ? 80 : 120);
            } catch(e) {}
        }

        const config = {
            draggable: true,
            position: 'start',
            onDrop: handleMove,
            onDragStart: onDragStart,
            onMouseoverSquare: onMouseoverSquare,
            onMouseoutSquare: onMouseoutSquare,
            pieceTheme: 'https://chessboardjs.com/img/chesspieces/wikipedia/{piece}.png'
        };

        function initBoard() {
            board = Chessboard('myBoard', config);
        }

        function onDragStart(source, piece) {
            // Prevent dragging if game over or wrong turn
            if (game.isGameOver() || 
                (isAIEnabled && game.turn() !== playerColor) ||
                (piece.search(/^b/) !== -1 && playerColor === 'w') ||
                (piece.search(/^w/) !== -1 && playerColor === 'b')) {
                return false;
            }
        }

        function onMouseoverSquare(square) {
            const moves = game.moves({ square: square, verbose: true });
            if (moves.length === 0) return;

            for (let i = 0; i < moves.length; i++) {
                const target = moves[i].to;
                $(`#myBoard .square-${target}`).addClass('highlight-square');
            }
        }

        function onMouseoutSquare(square) {
            $('.highlight-square').removeClass('highlight-square');
        }

        function handleMove(source, target) {
            $('.highlight-square').removeClass('highlight-square');

            const move = game.move({
                from: source,
                to: target,
                promotion: 'q'
            });

            if (move === null) return 'snapback';

            playMoveSound(move.captured);
            updateCapturedPieces();
            updateStatus();
            addToMoveHistory();

            if (game.isGameOver()) {
                showGameOverModal();
                return;
            }

            if (isAIEnabled && game.turn() !== playerColor) {
                setTimeout(makeAIMove, 300);
            }
        }

        function makeAIMove() {
            // (minimax function stays the same as before - copy from previous step if needed)
            // For brevity, I'm assuming you keep the previous minimax + evaluateBoard functions here.
            // Paste them in if you removed them.

            // ... (insert the full makeAIMove, minimax, evaluateBoard from step 6 here) ...

            if (bestMove) {
                game.move(bestMove);
                board.position(game.fen());
                playMoveSound(bestMove.captured);
                updateCapturedPieces();
                updateStatus();
                addToMoveHistory();

                if (game.isGameOver()) {
                    showGameOverModal();
                }
            }
        }

        // Keep all other functions from step 6: updateCapturedPieces, updateStatus, addToMoveHistory, newGame, undoMove, flipBoard, toggleMode, toggleTheme

        function showGameOverModal() {
            const modal = document.getElementById('gameModal');
            const title = document.getElementById('modalTitle');
            const message = document.getElementById('modalMessage');

            if (game.isCheckmate()) {
                title.textContent = "Checkmate!";
                message.textContent = `${game.turn() === 'w' ? 'Black' : 'White'} wins!`;
            } else {
                title.textContent = "Draw";
                message.textContent = game.isStalemate() ? "Stalemate" : "Game ended in draw";
            }
            modal.style.display = 'flex';
        }

        function closeModal() {
            document.getElementById('gameModal').style.display = 'none';
        }

        function exportPGN() {
            const pgn = game.pgn();
            if (!pgn) {
                alert("No moves to export yet!");
                return;
            }
            const blob = new Blob([pgn], { type: 'text/plain' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = 'my-chess-game.pgn';
            document.body.appendChild(a);
            a.click();
            document.body.removeChild(a);
            URL.revokeObjectURL(url);
            alert("Game exported as PGN! You can open it in any chess program.");
        }

        // Paste here the full minimax, evaluateBoard, updateCapturedPieces, updateStatus, addToMoveHistory, newGame, undoMove, flipBoard, toggleMode, toggleTheme functions from Step 6

        window.onload = function() {
            initBoard();
            updateStatus();
        };
    </script>
</body>
</html>
