<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Chess Website ♟️</title>
    
    <!-- Chessboard.js CSS from CDN -->
    <link rel="stylesheet" href="https://unpkg.com/@chrisoakman/chessboardjs@1.0.0/dist/chessboard-1.0.0.min.css">
    
        <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #1e1e2e, #2a2a40);
            color: #eee;
            margin: 0;
            padding: 20px;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        h1 {
            margin: 10px 0 5px;
            font-size: 2.8rem;
            text-shadow: 0 4px 10px rgba(0,0,0,0.5);
        }
        .subtitle {
            margin-bottom: 30px;
            color: #aaa;
        }
        .main-container {
            display: flex;
            gap: 50px;
            flex-wrap: wrap;
            justify-content: center;
            align-items: flex-start;
        }
        #myBoard {
            width: 520px;
            height: 520px;
            box-shadow: 0 15px 40px rgba(0,0,0,0.7);
            border: 15px solid #3c2f1e;
            border-radius: 8px;
            background: #3c2f1e;
        }
        .sidebar {
            width: 320px;
            background: #25253a;
            padding: 25px;
            border-radius: 16px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }
        button {
            background: #4a9eff;
            color: white;
            border: none;
            padding: 14px 20px;
            margin: 8px 0;
            border-radius: 8px;
            cursor: pointer;
            font-size: 16px;
            width: 100%;
            transition: all 0.2s;
        }
        button:hover {
            background: #3a8be6;
            transform: translateY(-2px);
        }
        #status {
            font-size: 22px;
            font-weight: bold;
            margin: 20px 0;
            text-align: center;
            min-height: 32px;
            color: #ffd700;
        }
        .captured {
            display: flex;
            flex-wrap: wrap;
            gap: 6px;
            margin: 15px 0;
            min-height: 40px;
        }
        .captured span {
            font-size: 28px;
            line-height: 1;
        }
        .move-history {
            max-height: 280px;
            overflow-y: auto;
            background: #1a1a2e;
            padding: 15px;
            border-radius: 8px;
            font-family: monospace;
            line-height: 1.6;
            margin-bottom: 20px;
        }
        .theme-toggle {
            background: #666;
            margin-top: 15px;
        }
        .theme-toggle:hover {
            background: #888;
        }
    </style>
</head>
<body>
        <h1>♟️ Chess Arena</h1>
    <p class="subtitle">Play vs Friend or AI • Free & Open Source</p>

    <div class="main-container">
        <div id="myBoard"></div>

        <div class="sidebar">
            <h2>Game Controls</h2>
            <button onclick="newGame()">New Game</button>
            <button onclick="undoMove()">Undo Last Move</button>
            <button onclick="flipBoard()">Flip Board</button>
            <button onclick="toggleTheme()" class="theme-toggle">Toggle Dark/Light Theme</button>
            
            <div id="status">White to move</div>
            
            <h3>Captured by White</h3>
            <div id="captured-white" class="captured"></div>
            
            <h3>Captured by Black</h3>
            <div id="captured-black" class="captured"></div>
            
            <h3>Move History</h3>
            <div id="move-history" class="move-history"></div>
            
            <h3>Mode</h3>
            <button id="modeBtn" onclick="toggleMode()">Play vs AI (Minimax)</button>
        </div>
    </div>

    <!-- Libraries via CDN -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jquery/3.6.0/jquery.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/chess.js/0.10.3/chess.min.js"></script>
    <script src="https://unpkg.com/@chrisoakman/chessboardjs@1.0.0/dist/chessboard-1.0.0.min.js"></script>

       <!-- Libraries via CDN -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jquery/3.6.0/jquery.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/chess.js/0.10.3/chess.min.js"></script>
    <script src="https://unpkg.com/@chrisoakman/chessboardjs@1.0.0/dist/chessboard-1.0.0.min.js"></script>

    <script>
        let game = new Chess();
        let board = null;
        let isAIEnabled = true;
        let playerColor = 'w';
        let isDarkTheme = true;

        // Simple move sound using Web Audio API (no external files needed)
        function playMoveSound(isCapture) {
            try {
                const audioContext = new (window.AudioContext || window.webkitAudioContext)();
                const oscillator = audioContext.createOscillator();
                const gain = audioContext.createGain();
                
                oscillator.type = isCapture ? 'sawtooth' : 'sine';
                oscillator.frequency.setValueAtTime(isCapture ? 800 : 600, audioContext.currentTime);
                gain.gain.value = 0.3;
                
                oscillator.connect(gain);
                gain.connect(audioContext.destination);
                
                oscillator.start();
                setTimeout(() => {
                    oscillator.stop();
                }, isCapture ? 80 : 120);
            } catch(e) {}
        }

        const config = {
            draggable: true,
            position: 'start',
            onDrop: handleMove,
            pieceTheme: 'https://chessboardjs.com/img/chesspieces/wikipedia/{piece}.png'
        };

        function initBoard() {
            board = Chessboard('myBoard', config);
        }

        function handleMove(source, target) {
            const move = game.move({
                from: source,
                to: target,
                promotion: 'q'
            });

            if (move === null) return 'snapback';

            playMoveSound(move.captured);
            updateCapturedPieces();
            updateStatus();
            addToMoveHistory();
            
            if (isAIEnabled && game.turn() !== playerColor) {
                setTimeout(makeAIMove, 250);
            }
        }

        function makeAIMove() {
            const depth = 3;
            let bestMove = null;
            let bestValue = game.turn() === 'w' ? -Infinity : Infinity;

            const possibleMoves = game.moves({ verbose: true });

            for (let move of possibleMoves) {
                game.move(move);
                const value = minimax(depth - 1, game.turn() === 'w');
                game.undo();

                if ((game.turn() === 'b' && value > bestValue) || (game.turn() === 'w' && value < bestValue)) {
                    bestValue = value;
                    bestMove = move;
                }
            }

            if (bestMove) {
                game.move(bestMove);
                board.position(game.fen());
                playMoveSound(bestMove.captured);
                updateCapturedPieces();
                updateStatus();
                addToMoveHistory();
            }
        }

        function minimax(depth, isMaximizing) {
            if (depth === 0 || game.isGameOver()) {
                return evaluateBoard();
            }

            const moves = game.moves();

            if (isMaximizing) {
                let best = -Infinity;
                for (let move of moves) {
                    game.move(move);
                    best = Math.max(best, minimax(depth - 1, false));
                    game.undo();
                }
                return best;
            } else {
                let best = Infinity;
                for (let move of moves) {
                    game.move(move);
                    best = Math.min(best, minimax(depth - 1, true));
                    game.undo();
                }
                return best;
            }
        }

        function evaluateBoard() {
            const pieceValues = { p: 100, n: 320, b: 330, r: 500, q: 900, k: 20000 };
            let score = 0;
            const boardState = game.board();

            for (let row of boardState) {
                for (let square of row) {
                    if (square) {
                        const value = pieceValues[square.type];
                        score += square.color === 'w' ? value : -value;
                    }
                }
            }
            return score;
        }

        function updateCapturedPieces() {
            const history = game.history({ verbose: true });
            let whiteCaptured = [];
            let blackCaptured = [];

            history.forEach(move => {
                if (move.captured) {
                    const piece = move.captured.toUpperCase();
                    if (move.color === 'w') {
                        blackCaptured.push(piece);
                    } else {
                        whiteCaptured.push(piece);
                    }
                }
            });

            const unicodePieces = { P:'♙', N:'♘', B:'♗', R:'♖', Q:'♕', K:'♔' };

            document.getElementById('captured-white').innerHTML = whiteCaptured.map(p => `<span>${unicodePieces[p] || p}</span>`).join('');
            document.getElementById('captured-black').innerHTML = blackCaptured.map(p => `<span>${unicodePieces[p] || p}</span>`).join('');
        }

        function updateStatus() {
            let status = '';
            if (game.isCheckmate()) {
                status = `Game Over — ${game.turn() === 'w' ? 'Black' : 'White'} wins by checkmate! 🎉`;
            } else if (game.isDraw()) {
                status = game.isStalemate() ? 'Draw by stalemate' : 'Game Over — Draw';
            } else {
                status = `${game.turn() === 'w' ? 'White' : 'Black'} to move`;
                if (game.isCheck()) status += ' ⚠️ CHECK!';
            }
            document.getElementById('status').textContent = status;
        }

        function addToMoveHistory() {
            const historyDiv = document.getElementById('move-history');
            const moves = game.history();
            historyDiv.innerHTML = '';
            for (let i = 0; i < moves.length; i += 2) {
                const num = Math.floor(i / 2) + 1;
                let text = `${num}. ${moves[i]}`;
                if (moves[i + 1]) text += ` ${moves[i + 1]}`;
                const p = document.createElement('p');
                p.textContent = text;
                historyDiv.appendChild(p);
            }
            historyDiv.scrollTop = historyDiv.scrollHeight;
        }

        function newGame() {
            game.reset();
            board.position('start');
            document.getElementById('move-history').innerHTML = '';
            document.getElementById('captured-white').innerHTML = '';
            document.getElementById('captured-black').innerHTML = '';
            updateStatus();
        }

        function undoMove() {
            if (game.undo()) {
                board.position(game.fen());
                updateCapturedPieces();
                addToMoveHistory();
                updateStatus();
            }
        }

        function flipBoard() {
            board.flip();
        }

        function toggleMode() {
            isAIEnabled = !isAIEnabled;
            const btn = document.getElementById('modeBtn');
            if (isAIEnabled) {
                btn.textContent = 'Play vs AI (Minimax)';
                playerColor = 'w';
                alert("AI Mode Active!\nYou are White.\nAI uses minimax (may take 1-4 seconds per move).");
            } else {
                btn.textContent = 'Play vs Friend (Hotseat)';
            }
            newGame();
        }

        function toggleTheme() {
            isDarkTheme = !isDarkTheme;
            if (!isDarkTheme) {
                document.body.style.background = 'linear-gradient(135deg, #f0f0f0, #e0e0e0)';
                document.body.style.color = '#222';
            } else {
                document.body.style.background = 'linear-gradient(135deg, #1e1e2e, #2a2a40)';
                document.body.style.color = '#eee';
            }
            alert("Theme switched! (More advanced theming coming later)");
        }

        window.onload = function() {
            initBoard();
            updateStatus();
        };
    </script>
</body>
</html>
