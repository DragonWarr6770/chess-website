<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Chess Website ♟️</title>
    
    <!-- Chessboard.js CSS from CDN -->
    <link rel="stylesheet" href="https://unpkg.com/@chrisoakman/chessboardjs@1.0.0/dist/chessboard-1.0.0.min.css">
    
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #1e1e2e, #2a2a40);
            color: #eee;
            margin: 0;
            padding: 20px;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        h1 {
            margin: 10px 0 5px;
            font-size: 2.8rem;
            text-shadow: 0 4px 10px rgba(0,0,0,0.5);
        }
        .subtitle {
            margin-bottom: 30px;
            color: #aaa;
        }
        .container {
            display: flex;
            gap: 50px;
            flex-wrap: wrap;
            justify-content: center;
            align-items: flex-start;
        }
        #myBoard {
            width: 520px;
            height: 520px;
            box-shadow: 0 15px 40px rgba(0,0,0,0.7);
            border: 15px solid #3c2f1e;
            border-radius: 8px;
            background: #3c2f1e;
        }
        .sidebar {
            width: 300px;
            background: #25253a;
            padding: 25px;
            border-radius: 16px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }
        button {
            background: #4a9eff;
            color: white;
            border: none;
            padding: 14px 20px;
            margin: 10px 0;
            border-radius: 8px;
            cursor: pointer;
            font-size: 16px;
            width: 100%;
            transition: all 0.2s;
        }
        button:hover {
            background: #3a8be6;
            transform: translateY(-2px);
        }
        #status {
            font-size: 22px;
            font-weight: bold;
            margin: 20px 0;
            text-align: center;
            min-height: 32px;
            color: #ffd700;
        }
        .move-history {
            max-height: 320px;
            overflow-y: auto;
            background: #1a1a2e;
            padding: 15px;
            border-radius: 8px;
            font-family: monospace;
            line-height: 1.5;
        }
        .move-history p {
            margin: 4px 0;
        }
    </style>
</head>
<body>
    <h1>♟️ Chess Arena</h1>
    <p class="subtitle">Play against a friend or AI • Built with love in 100 steps</p>

    <div class="container">
        <div id="myBoard"></div>

        <div class="sidebar">
            <h2>Game Controls</h2>
            <button onclick="newGame()">New Game</button>
            <button onclick="undoMove()">Undo Last Move</button>
            <button onclick="flipBoard()">Flip Board</button>
            
            <div id="status">White to move</div>
            
            <h3>Move History</h3>
            <div id="move-history" class="move-history"></div>
            
            <h3>Mode</h3>
            <button id="modeBtn" onclick="toggleMode()">Play vs Friend (Hotseat)</button>
        </div>
    </div>

    <!-- Libraries via CDN -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jquery/3.6.0/jquery.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/chess.js/0.10.3/chess.min.js"></script>
    <script src="https://unpkg.com/@chrisoakman/chessboardjs@1.0.0/dist/chessboard-1.0.0.min.js"></script>

    <script>
        let game = new Chess();
        let board = null;
        let isAIEnabled = false;
        let playerColor = 'w'; // 'w' or 'b' - for future AI mode

        const config = {
            draggable: true,
            position: 'start',
            onDrop: handleMove,
            pieceTheme: 'https://chessboardjs.com/img/chesspieces/wikipedia/{piece}.png'
        };

        function initBoard() {
            board = Chessboard('myBoard', config);
        }

        function handleMove(source, target) {
            // Try the move
            const move = game.move({
                from: source,
                to: target,
                promotion: 'q' // always promote to queen for simplicity
            });

            if (move === null) return 'snapback'; // illegal move

            updateStatus();
            addToMoveHistory(move);
            
            // If AI mode is on and it's AI's turn, make AI move after a delay
            if (isAIEnabled && game.turn() !== playerColor) {
                setTimeout(makeAIMove, 300);
            }
        }

        function makeAIMove() {
            // Very simple random AI for now (will improve later)
            const possibleMoves = game.moves();
            if (possibleMoves.length === 0) return;

            const randomIdx = Math.floor(Math.random() * possibleMoves.length);
            const move = game.move(possibleMoves[randomIdx]);

            board.position(game.fen());
            updateStatus();
            addToMoveHistory(move);
        }

        function updateStatus() {
            let status = '';
            if (game.isCheckmate()) {
                status = `Game Over - ${game.turn() === 'w' ? 'Black' : 'White'} wins by checkmate!`;
            } else if (game.isDraw()) {
                status = 'Game Over - Draw';
            } else {
                status = (game.turn() === 'w' ? 'White' : 'Black') + ' to move';
                if (game.isCheck()) status += ' (in check)';
            }
            document.getElementById('status').textContent = status;
        }

        function addToMoveHistory(move) {
            const historyDiv = document.getElementById('move-history');
            const moveNumber = Math.ceil(game.history().length / 2);
            const moveText = game.history().length % 2 === 1 
                ? `${moveNumber}. ${move.san}` 
                : `${move.san}`;
            
            const p = document.createElement('p');
            p.textContent = moveText;
            historyDiv.appendChild(p);
            historyDiv.scrollTop = historyDiv.scrollHeight;
        }

        function newGame() {
            game.reset();
            board.position('start');
            document.getElementById('move-history').innerHTML = '';
            updateStatus();
        }

        function undoMove() {
            const move = game.undo();
            if (move) {
                board.position(game.fen());
                // Remove last move from history (simple way: clear and rebuild - we'll improve later)
                const historyDiv = document.getElementById('move-history');
                historyDiv.innerHTML = '';
                game.history().forEach((san, i) => {
                    const p = document.createElement('p');
                    const num = Math.floor(i/2) + 1;
                    p.textContent = i % 2 === 0 ? `${num}. ${san}` : san;
                    historyDiv.appendChild(p);
                });
                updateStatus();
            }
        }

        function flipBoard() {
            board.flip();
        }

        function toggleMode() {
            isAIEnabled = !isAIEnabled;
            const btn = document.getElementById('modeBtn');
            if (isAIEnabled) {
                btn.textContent = 'Play vs Random AI';
                alert("AI mode activated! The computer will play as Black for now.\n\n(We will make the AI much smarter in later steps)");
            } else {
                btn.textContent = 'Play vs Friend (Hotseat)';
            }
            newGame(); // restart game when switching mode
        }

        // Initialize everything
        window.onload = function() {
            initBoard();
            updateStatus();
        };
    </script>
</body>
</html>
